name: LeadForge Prospector

on:
  schedule:
    - cron: '0 7 * * *'  # Cada día a las 9:00 hora española (UTC+2 verano)
  workflow_dispatch:      # También permite lanzarlo manualmente

jobs:
  prospect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests dnspython

      - name: Ejecutar prospector
        env:
          BREVO_API_KEY:  ${{ secrets.BREVO_API_KEY }}
          GMAPS_API_KEY:  ${{ secrets.GMAPS_API_KEY }}
          MY_EMAIL:       ${{ secrets.MY_EMAIL }}
          SENDER_EMAIL:   ${{ secrets.SENDER_EMAIL }}
        run: python prospector.py

      - name: Guardar emails enviados y CRM
        run: |
          git config user.name "prospector-bot"
          git config user.email "bot@leadforge.es"
          git add sent_emails.json crm_data.json
          git diff --staged --quiet || git commit -m "chore: actualizar sent_emails y crm"
          git push
