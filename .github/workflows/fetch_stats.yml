name: LeadForge CRM Stats

on:
  schedule:
    - cron: '0 20 * * *'  # Cada día a las 22:00 hora española — después del prospector
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Actualizar stats CRM
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: python fetch_stats.py

      - name: Guardar CRM actualizado
        run: |
          git config user.name "prospector-bot"
          git config user.email "bot@leadforge.es"
          git add crm_data.json
          git diff --staged --quiet || git commit -m "chore: actualizar stats CRM"
          git push
